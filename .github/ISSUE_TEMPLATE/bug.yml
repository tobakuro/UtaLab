name: バグ報告
description: バグや不具合の報告
labels: ['bug']
body:
  - type: textarea
    id: description
    attributes:
      label: バグの内容
      description: 何が起きたか簡潔に説明してください
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 再現手順
      description: バグを再現する手順を記載してください
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期待する動作
      description: 本来どう動くべきか
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 実際の動作
      description: 実際にはどうなったか
    validations:
      required: true
  - type: dropdown
    id: browser
    attributes:
      label: ブラウザ
      options:
        - Chrome
        - Edge
        - Firefox
        - その他
    validations:
      required: true
  - type: textarea
    id: additional
    attributes:
      label: 補足情報
      description: スクリーンショットやエラーログがあれば貼ってください
    validations:
      required: false
